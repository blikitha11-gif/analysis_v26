<div class="min-h-screen bg-[#f4f7f6] font-sans text-gray-900 overflow-x-hidden">
  <app-header (toggleSidebar)="isSidebarOpen = !isSidebarOpen"></app-header>
  
  <div class="flex pt-14">
    <app-sidebar [isOpen]="isSidebarOpen"></app-sidebar>
    
    <main 
      [ngClass]="cn(
        'flex-1 transition-all duration-300 min-h-[calc(100vh-56px)]',
        isSidebarOpen ? 'md:ml-64' : 'ml-0'
      )"
    >
      <div class="max-w-[1700px] p-4 mx-auto">
        <router-outlet></router-outlet>
      </div>
    </main>
  </div>
</div>
