<aside 
  [ngClass]="cn(
    'fixed left-0 top-14 h-[calc(100vh-56px)] bg-white border-r border-gray-200 transition-all duration-300 z-40 overflow-y-auto scrollbar-thin scrollbar-thumb-gray-200',
    isOpen ? 'w-64 translate-x-0' : 'w-0 -translate-x-full'
  )"
>
  <!-- Search Student Box -->
  <div class="p-3 border-b border-gray-100">
    <div class="relative group">
      <input
        type="text"
        placeholder="Student.."
        class="w-full pl-3 pr-8 py-1.5 text-sm border border-gray-200 rounded focus:ring-1 focus:ring-blue-400 focus:border-blue-400 outline-none transition-all placeholder:text-gray-400"
      />
      <lucide-icon [img]="Search" class="absolute right-2.5 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400 group-hover:text-gray-500"></lucide-icon>
    </div>
  </div>

  <nav class="py-2">
    <ng-container *ngFor="let item of menuItems">
      <div class="border-b border-gray-50 last:border-0">
        
        <ng-container *ngIf="item.children; else noChildren">
          <div>
            <button
              (click)="toggleMenu(item.label)"
              [ngClass]="cn(
                'w-full flex items-center justify-between px-4 py-2.5 text-gray-700 hover:bg-gray-50 transition-all group border-l-4 border-transparent',
                openMenus.includes(item.label) ? 'bg-blue-50/30 text-blue-800 border-l-[#337ab7] font-medium' : ''
              )"
            >
              <div class="flex items-center gap-3">
                <lucide-icon [img]="item.icon" [ngClass]="cn(
                  'w-5 h-5 transition-colors',
                  openMenus.includes(item.label) ? 'text-[#337ab7]' : 'text-gray-500 group-hover:text-[#337ab7]'
                )"></lucide-icon>
                <span class="text-sm">{{ item.label }}</span>
              </div>
              <lucide-icon [img]="ChevronRight" [ngClass]="cn(
                'w-4 h-4 text-gray-400 transition-transform duration-200',
                openMenus.includes(item.label) ? 'rotate-90 text-[#337ab7]' : ''
              )"></lucide-icon>
            </button>
            
            <div *ngIf="openMenus.includes(item.label)" class="bg-gray-50/50 py-1 border-t border-gray-50">
              <a
                *ngFor="let child of item.children"
                [routerLink]="child.path"
                routerLinkActive="text-[#337ab7] font-bold bg-white border-l-[#337ab7]"
                [routerLinkActiveOptions]="{exact: true}"
                class="flex items-center gap-3 pl-10 pr-4 py-2 text-[13px] text-gray-600 hover:text-[#337ab7] hover:bg-white transition-all border-l-4 border-transparent"
              >
                <lucide-icon [img]="ChevronRight" class="w-3 h-3 opacity-50"></lucide-icon>
                {{ child.label }}
              </a>
            </div>
          </div>
        </ng-container>

        <ng-template #noChildren>
          <a
            [routerLink]="item.path"
            routerLinkActive="bg-blue-50/30 text-[#337ab7] font-bold border-l-[#337ab7]"
            [routerLinkActiveOptions]="{exact: true}"
            #rla="routerLinkActive"
            [ngClass]="'flex items-center gap-3 px-4 py-2.5 text-gray-700 hover:bg-gray-50 transition-all group border-l-4 border-transparent'"
          >
            <lucide-icon [img]="item.icon" [ngClass]="cn(
              'w-5 h-5 transition-colors',
              rla.isActive ? 'text-[#337ab7]' : 'text-gray-500 group-hover:text-[#337ab7]'
            )"></lucide-icon>
            <span class="text-sm">{{ item.label }}</span>
          </a>
        </ng-template>

      </div>
    </ng-container>
  </nav>
</aside>
